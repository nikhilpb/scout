name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync
        run: uv sync --all-extras
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest -m 'not browser and not smoke' -q
